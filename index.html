<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aurora Moon Haven</title>

<style>
body {
    margin:0;
    background:transparent;
    font-family: 'Segoe UI', sans-serif;
    color:#CBECF5;
}

.widget {
    width: 320px;
    padding: 16px;
    border-radius: 20px;
    background: rgba(20,25,60,0.65);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px #7F87FF;
}

.title {
    font-size: 22px;
    font-weight: bold;
    text-align:center;
    color:#C6C7F8;
    margin-bottom:10px;
}

.current {
    font-size:22px;
    font-weight:bold;
    margin-bottom:8px;
}

.section {
    font-size:16px;
    margin:4px 0;
}

.spoonie {
    margin-top:10px;
    font-size:14px;
    color:#00A9BA;
}
</style>
</head>

<body>

<div class="widget">
<div class="title">🌙 Aurora Moon Haven 🌙</div>

<div class="current" id="temp">Loading...</div>
<div class="section" id="humidity"></div>
<div class="section" id="pressure"></div>
<div class="section" id="wind"></div>
<div class="section" id="rain"></div>

<div class="spoonie" id="spoonie"></div>
</div>
<script>
async function getWeather() {
    try {
        const response = await fetch("https://api.synopticdata.com/v2/stations/latest?stid=GW6819&units=english&vars=air_temp,relative_humidity,wind_speed,wind_direction,sea_level_pressure,precip_accum&output=json&token=4443001629c7472f8bf9ea4312309c53");

        const data = await response.json();

        if (!data.STATION || !data.STATION.length) {
            throw new Error("No station data");
        }

        const obs = data.STATION[0].OBSERVATIONS;

        let temp = obs.air_temp_value_1?.value ?? obs.air_temp_value_1?.[0];
        let humidity = obs.relative_humidity_value_1?.value ?? obs.relative_humidity_value_1?.[0];
        let wind = obs.wind_speed_value_1?.value ?? obs.wind_speed_value_1?.[0];
        let pressure = obs.sea_level_pressure_value_1?.value ?? obs.sea_level_pressure_value_1?.[0];
        let rain = obs.precip_accum_value_1?.value ?? obs.precip_accum_value_1?.[0];

        temp = temp !== undefined ? Number(temp).toFixed(1) : "--";
        humidity = humidity !== undefined ? Math.round(humidity) : "--";
        wind = wind !== undefined ? Number(wind).toFixed(1) : "--";
        pressure = pressure !== undefined ? Number(pressure).toFixed(2) : "--";
        rain = rain !== undefined ? Number(rain).toFixed(2) : "0.00";

        document.getElementById("temp").innerHTML = temp + "°F";
        document.getElementById("humidity").innerHTML = "Humidity: " + humidity + "%";
        document.getElementById("pressure").innerHTML = "Pressure: " + pressure + " inHg";
        document.getElementById("wind").innerHTML = "Wind: " + wind + " mph";
        document.getElementById("rain").innerHTML = "Rain Today: " + rain + " in";

        let spoonieAlert = "";

        if (humidity > 70) spoonieAlert += "⚠️ High humidity may increase pain levels. ";
        if (pressure < 29.80) spoonieAlert += "⚠️ Low pressure system detected. ";
        if (temp < 40) spoonieAlert += "⚠️ Cold sensitivity alert. ";

        document.getElementById("spoonie").innerHTML = spoonieAlert;

    } catch (error) {
        document.getElementById("temp").innerHTML = "Atmospheric signal temporarily disrupted";
        document.getElementById("humidity").innerHTML = "";
        document.getElementById("pressure").innerHTML = "";
        document.getElementById("wind").innerHTML = "";
        document.getElementById("rain").innerHTML = "";
        document.getElementById("spoonie").innerHTML = "";
    }
}

getWeather();
setInterval(getWeather, 300000);
</script>
</body>
</html>
