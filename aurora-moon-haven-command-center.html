<style>
body {
    margin: 0;
    background: transparent;
    font-family: 'Trebuchet MS', sans-serif;
    color: #CBECF5;
    overflow: hidden;
}

/* Nebula + Aurora */
#nebula, #aurora {
    position: absolute;
    width: 250%;
    height: 250%;
    z-index: -3;
}

#nebula {
    background: radial-gradient(circle at 30% 30%, rgba(127,135,255,0.25), transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(0,169,186,0.25), transparent 40%);
    animation: drift 35s linear infinite;
}

#aurora {
    background: linear-gradient(120deg, rgba(127,135,255,0.25), rgba(0,169,186,0.25), rgba(198,199,248,0.2));
    animation: auroraMove 25s ease-in-out infinite alternate;
}

@keyframes drift {
    from { transform: translate(0,0); }
    to { transform: translate(-20%, -20%); }
}

@keyframes auroraMove {
    from { transform: translateX(-15%) rotate(0deg); }
    to { transform: translateX(15%) rotate(8deg); }
}

/* Main Box — Smaller Footprint */
#weather-box {
    position: relative;
    padding: 22px 28px; /* smaller padding */
    border-radius: 30px;
    backdrop-filter: blur(20px);
    background: rgba(15, 10, 65, 0.65);
    box-shadow:
        0 0 50px #7F87FF,
        0 0 100px #00A9BA,
        inset 0 0 30px rgba(198,199,248,0.6);
    width: 460px; /* smaller overall width */
}

.title {
    font-size: 18px;        /* slightly smaller than hero */
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #7F87FF, 0 0 18px #00A9BA;
    white-space: nowrap;
}

.section {
    margin-top: 2px;
    font-size: 22px;        /* HERO */
    font-weight: 600;
    line-height: 1.3;
}

.spoon-panel {
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px solid rgba(198,199,248,0.3);
    font-size: 15px;  /* slightly smaller than hero */
    line-height: 1.4;
}

.poetic {
    font-style: italic;
    opacity: 0.85;
    margin-top: 3px;
}

.high-risk {
    color: #7F87FF;
    text-shadow: 0 0 10px #7F87FF;
}

.moon {
    animation: breathe 6s ease-in-out infinite;
}

@keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.12); }
}
</style>
