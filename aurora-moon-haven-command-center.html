<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aurora Moon Haven Command Center</title>

<style>
body {
    margin: 0;
    background: transparent;
    font-family: 'Trebuchet MS', sans-serif;
    color: #CBECF5;
    overflow: hidden;
}

/* Nebula + Aurora */
#nebula, #aurora {
    position: absolute;
    width: 250%;
    height: 250%;
    z-index: -3;
}

#nebula {
    background: radial-gradient(circle at 30% 30%, rgba(127,135,255,0.25), transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(0,169,186,0.25), transparent 40%);
    animation: drift 35s linear infinite;
}

#aurora {
    background: linear-gradient(120deg, rgba(127,135,255,0.25), rgba(0,169,186,0.25), rgba(198,199,248,0.2));
    animation: auroraMove 25s ease-in-out infinite alternate;
}

@keyframes drift {
    from { transform: translate(0,0); }
    to { transform: translate(-20%, -20%); }
}

@keyframes auroraMove {
    from { transform: translateX(-15%) rotate(0deg); }
    to { transform: translateX(15%) rotate(8deg); }
}

/* Main Box */
#weather-box {
    position: relative;
    padding: 35px 45px;
    border-radius: 35px;
    backdrop-filter: blur(22px);
    background: rgba(15, 10, 65, 0.65);
    box-shadow:
        0 0 60px #7F87FF,
        0 0 120px #00A9BA,
        inset 0 0 35px rgba(198,199,248,0.6);
    width: 520px;
}

/* Title */
.title {
    font-size: 26px;
    text-align: center;
    margin-bottom: 18px;
    letter-spacing: 3px;
    text-shadow: 0 0 15px #7F87FF, 0 0 25px #00A9BA;
}

.section {
    margin-top: 10px;
    font-size: 17px;
    line-height: 1.6;
}

.spoon-panel {
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px solid rgba(198,199,248,0.3);
    font-size: 16px;
}

.soft-alert {
    color: #C6C7F8;
}

.warning {
    color: #00A9BA;
}

.high-risk {
    color: #7F87FF;
    text-shadow: 0 0 10px #7F87FF;
}

.poetic {
    font-style: italic;
    opacity: 0.85;
    margin-top: 4px;
}

.moon {
    animation: breathe 6s ease-in-out infinite;
}

@keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

</style>
</head>
<body>

<div id="nebula"></div>
<div id="aurora"></div>

<div id="weather-box">
    <div class="title">🌙 Aurora Moon Haven Command Center 🌙</div>
    <div id="weather-data" class="section">Consulting skies...</div>
    <div id="spoon-panel" class="spoon-panel"></div>
</div>

<script>

let lastPressure = null;
let lastTemp = null;

function getMoonPhase() {
    const now = new Date();
    const lp = 2551443;
    const new_moon = new Date(1970,0,7,20,35,0);
    const phase = ((now - new_moon) / 1000) % lp;
    const index = Math.floor((phase / lp) * 8);
    const phases = ["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"];
    return phases[index];
}

async function fetchWeather() {
    try {
        const response = await fetch("https://api.weather.com/v2/pws/observations/current?stationId=KMNSTLOU35&format=json&units=e&apiKey=bf4fed63fdcb4ff28fed63fdcbcff272");
        const data = await response.json();
        const obs = data.observations[0];

        const temp = obs.imperial.temp;
        const wind = obs.imperial.windSpeed;
        const humidity = obs.humidity;
        const pressure = obs.imperial.pressure;
        const condition = obs.wxPhrase;

        document.getElementById("weather-data").innerHTML = `
            🌡 ${temp}°F | 💨 ${wind} mph | 💧 ${humidity}%<br>
            🌤 ${condition} | 📉 ${pressure} inHg<br>
            <span class="moon">${getMoonPhase()}</span>
        `;

        // Spoon Logic
        let flareScore = 0;
        let messages = [];

        if (humidity > 70) {
            flareScore += 2;
            messages.push("💧 Humidity High — inflammation risk rising.");
        }

        if (lastPressure !== null && pressure < lastPressure - 0.05) {
            flareScore += 3;
            messages.push("📉 Pressure Dropping — body may feel this.");
        }

        if (lastTemp !== null && Math.abs(temp - lastTemp) >= 5) {
            flareScore += 2;
            messages.push("🌬 Temperature Shift — cold front sensitivity likely.");
        }

        if (wind > 10) {
            flareScore += 1;
            messages.push("🌿 Wind Elevated — allergy watch.");
        }

        let spoonStatus = "Stable Energy";
        let poeticLine = "The atmosphere rests gently.";

        if (flareScore >= 5) {
            spoonStatus = "High Flare Risk";
            poeticLine = "The veil thins. Move softly, Moonbeam.";
        } else if (flareScore >= 3) {
            spoonStatus = "Flare Watch";
            poeticLine = "The air carries weight today.";
        } else if (flareScore >= 1) {
            spoonStatus = "Low Reserve";
            poeticLine = "Conserve your light wisely.";
        } else {
            poeticLine = "The skies cradle you kindly.";
        }

        document.getElementById("spoon-panel").innerHTML = `
            🥄 Spoon Forecast: <span class="high-risk">${spoonStatus}</span><br>
            ${messages.join("<br>")}
            <div class="poetic">${poeticLine}</div>
        `;

        lastPressure = pressure;
        lastTemp = temp;

    } catch (e) {
        document.getElementById("weather-data").innerHTML = "Cosmic interference detected...";
    }
}

fetchWeather();
setInterval(fetchWeather, 60000);

</script>
</body>
</html>
